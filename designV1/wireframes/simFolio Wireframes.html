<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>simFolio — Wireframes v0.1</title>
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script type="text/babel" src="design-canvas.jsx"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    .wf-img {
      background-color: rgba(0,0,0,0.07);
      background-image: repeating-linear-gradient(45deg, transparent, transparent 5px, rgba(0,0,0,0.05) 5px, rgba(0,0,0,0.05) 6px);
    }
    .wf-img-dark {
      background-color: rgba(255,255,255,0.05);
      background-image: repeating-linear-gradient(45deg, transparent, transparent 5px, rgba(255,255,255,0.03) 5px, rgba(255,255,255,0.03) 6px);
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { DesignCanvas, DCSection, DCArtboard } = window;
    const AME = '#8A60EB';
    const AQUA = '#1FC3A4';

    function T(dark) {
      return {
        bg: dark ? '#17172A' : '#F5F5EF',
        fg: dark ? '#DDDDF0' : '#222',
        fgMuted: dark ? '#565675' : '#888',
        border: dark ? 'rgba(255,255,255,0.07)' : 'rgba(0,0,0,0.09)',
        surface: dark ? 'rgba(255,255,255,0.04)' : 'rgba(0,0,0,0.04)',
        surfaceBorder: dark ? 'rgba(255,255,255,0.1)' : 'rgba(0,0,0,0.13)',
        accentSurface: dark ? 'rgba(138,96,235,0.1)' : 'rgba(138,96,235,0.06)',
        accentBorder: 'rgba(138,96,235,0.25)',
        imgClass: dark ? 'wf-img-dark' : 'wf-img',
      };
    }

    /* ── Primitives ─────────────────────────────────────────────── */
    function Av({ size = 40, init = 'WB', color = AME, dark = false }) {
      return <div style={{ width: size, height: size, borderRadius: '50%', background: dark ? 'rgba(255,255,255,0.08)' : 'rgba(0,0,0,0.08)', display: 'flex', alignItems: 'center', justifyContent: 'center', fontFamily: 'Caveat', fontWeight: 600, fontSize: Math.round(size * 0.34), color, flexShrink: 0 }}>{init}</div>;
    }

    function Box({ w, h, label, style = {}, dark = false, children }) {
      const t = T(dark);
      return <div style={{ width: w, height: h, background: t.surface, border: `1.5px dashed ${t.surfaceBorder}`, borderRadius: 4, display: 'flex', alignItems: 'center', justifyContent: 'center', fontFamily: 'Caveat', fontSize: 11, color: t.fgMuted, textAlign: 'center', padding: 4, ...style }}>{children || label}</div>;
    }

    function Chip({ label, selected = false, dark = false, style = {} }) {
      const t = T(dark);
      return <div style={{ display: 'inline-flex', alignItems: 'center', border: `1.5px solid ${selected ? AME : t.surfaceBorder}`, borderRadius: 999, padding: '5px 13px', fontFamily: 'Caveat', fontSize: 13, background: selected ? 'rgba(138,96,235,0.1)' : 'transparent', color: selected ? AME : t.fg, flexShrink: 0, ...style }}>{label}</div>;
    }

    function Btn({ label, style = {} }) {
      return <div style={{ background: AME, color: 'white', borderRadius: 6, padding: '11px 22px', fontFamily: 'Caveat', fontSize: 14, fontWeight: 600, display: 'inline-flex', alignItems: 'center', justifyContent: 'center', cursor: 'default', flexShrink: 0, ...style }}>{label}</div>;
    }

    function WFInput({ placeholder, dark = false, style = {} }) {
      const t = T(dark);
      return <div style={{ background: t.surface, border: `1.5px solid ${t.surfaceBorder}`, borderRadius: 6, padding: '10px 14px', fontFamily: 'Caveat', fontSize: 13, color: t.fgMuted, ...style }}>{placeholder}</div>;
    }

    function StatusBar() {
      return <div style={{ height: 44, background: 'rgba(0,0,0,0.05)', display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '0 20px', fontFamily: 'Caveat', fontSize: 12, color: '#999', flexShrink: 0 }}><span>9:41</span><span>●●● ▌ 100%</span></div>;
    }

    function NavBar({ dark = false, children }) {
      const t = T(dark);
      return <div style={{ height: 64, borderBottom: `1.5px solid ${t.border}`, display: 'flex', alignItems: 'center', padding: '0 40px', gap: 32, flexShrink: 0, background: t.bg }}>{children}</div>;
    }

    function HeroBubble({ text, dark = false, style = {} }) {
      return <div style={{ background: 'rgba(138,96,235,0.1)', border: '1.5px solid rgba(138,96,235,0.2)', borderRadius: '0 12px 12px 12px', padding: '10px 14px', fontFamily: 'Caveat', fontSize: 13, lineHeight: 1.4, color: dark ? '#DDDDF0' : '#222', maxWidth: 280, ...style }}>{text}</div>;
    }

    function UserBubble({ text, dark = false, style = {} }) {
      return <div style={{ background: 'rgba(31,195,164,0.1)', border: '1.5px solid rgba(31,195,164,0.2)', borderRadius: '12px 0 12px 12px', padding: '10px 14px', fontFamily: 'Caveat', fontSize: 13, lineHeight: 1.4, color: dark ? '#DDDDF0' : '#222', maxWidth: 260, alignSelf: 'flex-end', ...style }}>{text}</div>;
    }

    function Dot({ color = 'green' }) {
      const cols = { green: AQUA, yellow: '#F5C542', red: '#E05C5C' };
      return <div style={{ width: 8, height: 8, borderRadius: '50%', background: cols[color] || cols.green, flexShrink: 0 }} />;
    }

    function Annot({ children, style = {} }) {
      return <div style={{ fontFamily: 'Caveat', fontSize: 11, color: AME, fontStyle: 'italic', lineHeight: 1.3, pointerEvents: 'none', ...style }}>{children}</div>;
    }

    function SectionLabel({ children, dark = false }) {
      return <div style={{ fontFamily: 'Caveat', fontSize: 10, textTransform: 'uppercase', letterSpacing: '0.12em', color: T(dark).fgMuted, marginBottom: 8 }}>{children}</div>;
    }

    function Holding({ ticker, name, qty, value, pct, sentiment = 'green', dark = false }) {
      const t = T(dark);
      return (
        <div style={{ display: 'flex', alignItems: 'center', padding: '9px 0', borderBottom: `1px solid ${t.border}`, gap: 10 }}>
          <Box w={36} h={36} label={ticker} dark={dark} style={{ fontSize: 11, fontWeight: 600, flexShrink: 0 }} />
          <div style={{ flex: 1, minWidth: 0 }}>
            <div style={{ fontFamily: 'Caveat', fontWeight: 600, fontSize: 13, color: t.fg }}>{name}</div>
            <div style={{ fontFamily: 'Caveat', fontSize: 11, color: t.fgMuted }}>{qty}</div>
          </div>
          <div style={{ textAlign: 'right', flexShrink: 0 }}>
            <div style={{ fontFamily: 'Caveat', fontWeight: 600, fontSize: 13, color: t.fg }}>{value}</div>
            <div style={{ fontFamily: 'Caveat', fontSize: 11, color: pct.startsWith('+') ? AQUA : '#E05C5C' }}>{pct}</div>
          </div>
          <Dot color={sentiment} />
        </div>
      );
    }

    function HoldingsList({ dark = false }) {
      const rows = [['AAPL','Apple Inc.','5 sh','$945','+12.4%','green'],['VTI','Vanguard Total ETF','10 sh','$2,340','+8.1%','green'],['BTC','Bitcoin','0.12 BTC','$7,421','+31.5%','yellow'],['TSLA','Tesla','3 sh','$2,109','-5.2%','red']];
      return (
        <div>
          <SectionLabel dark={dark}>Holdings · <span style={{ color: AME }}>● = Hero sentiment</span></SectionLabel>
          {rows.map(([t,n,q,v,p,s]) => <Holding key={t} ticker={t} name={n} qty={q} value={v} pct={p} sentiment={s} dark={dark} />)}
        </div>
      );
    }

    /* ── AUTH SCREENS ───────────────────────────────────────────── */

    /* Welcome / landing — mobile */
    function WelcomeMobile() {
      return (
        <div style={{ width:375, height:812, background:'#F5F5EF', display:'flex', flexDirection:'column', border:'2.5px solid #2A2A2A', borderRadius:40, overflow:'hidden' }}>
          <StatusBar />
          <div style={{ flex:1, padding:'32px 28px 24px', display:'flex', flexDirection:'column', gap:0 }}>
            {/* Logo + tagline */}
            <div style={{ flex:1, display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', gap:16 }}>
              <div style={{ width:64, height:64, borderRadius:16, background:`${AME}14`, border:`2px solid ${AME}33`, display:'flex', alignItems:'center', justifyContent:'center', fontSize:32 }}>◇</div>
              <div style={{ textAlign:'center' }}>
                <div style={{ fontFamily:'Caveat', fontWeight:600, fontSize:34, color:'#222' }}>simFolio</div>
                <div style={{ fontFamily:'Caveat', fontSize:15, color:'#888', marginTop:4, lineHeight:1.5 }}>Learn investing by doing it.
With legendary investors as your guides.</div>
              </div>
              <div style={{ background:'rgba(138,96,235,0.07)', border:`1px solid ${AME}22`, borderRadius:999, padding:'5px 16px', fontFamily:'Caveat', fontSize:12, color:AME }}>Simulated only — no real money involved</div>
            </div>

            {/* Auth CTAs */}
            <div style={{ display:'flex', flexDirection:'column', gap:10 }}>
              <Btn label="Get started →" style={{ width:'100%', padding:14, borderRadius:10, fontSize:15 }} />
              <Btn label="Sign in" style={{ width:'100%', padding:13, borderRadius:10, fontSize:15, background:'transparent', color:AME, border:`1.5px solid ${AME}` }} />
              {/* Social */}
              <div style={{ display:'flex', gap:10 }}>
                {['Continue with Google','Continue with Apple'].map((label,i) => (
                  <div key={label} style={{ flex:1, border:'1.5px solid rgba(0,0,0,0.15)', borderRadius:8, padding:'11px 8px', display:'flex', alignItems:'center', justifyContent:'center', gap:6, background:'white', cursor:'default' }}>
                    <div style={{ width:16, height:16, borderRadius:'50%', background:'rgba(0,0,0,0.1)', flexShrink:0 }} />
                    <div style={{ fontFamily:'Caveat', fontSize:12, color:'#333' }}>{label.split(' ').slice(2).join(' ')}</div>
                  </div>
                ))}
              </div>
              {/* Language */}
              <div style={{ textAlign:'center', marginTop:4 }}>
                <div style={{ fontFamily:'Caveat', fontSize:12, color:'#aaa' }}>Language: <span style={{ color:AME, cursor:'default' }}>English · 繁體中文 →</span></div>
              </div>
            </div>
          </div>
        </div>
      );
    }

    /* Welcome / landing — desktop */
    function WelcomeDesktop() {
      return (
        <div style={{ width:1280, height:800, background:'#F5F5EF', display:'flex' }}>
          {/* Left: brand */}
          <div style={{ flex:1, display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', gap:24, padding:'60px', borderRight:'1.5px solid rgba(0,0,0,0.08)' }}>
            <div style={{ display:'flex', gap:16, alignItems:'center' }}>
              <div style={{ width:56, height:56, borderRadius:14, background:`${AME}14`, border:`2px solid ${AME}33`, display:'flex', alignItems:'center', justifyContent:'center', fontSize:28 }}>◇</div>
              <div style={{ fontFamily:'Caveat', fontWeight:600, fontSize:40, color:'#222' }}>simFolio</div>
            </div>
            <div style={{ fontFamily:'Caveat', fontSize:18, color:'#555', textAlign:'center', lineHeight:1.7, maxWidth:360 }}>
              Learn investing by doing it.
With legendary investors as your personal guides.
All simulated. All educational. No real money.
            </div>
            {/* Hero avatars */}
            <div style={{ display:'flex', gap:14, marginTop:8 }}>
              {[['WB','Warren Buffett','Value',AME],['CW','Cathie Wood','Growth',AQUA],['RD','Ray Dalio','Balance','#C99A2E']].map(([init,name,style,color]) => (
                <div key={init} style={{ display:'flex', flexDirection:'column', alignItems:'center', gap:6 }}>
                  <Av size={48} init={init} color={color} />
                  <div style={{ fontFamily:'Caveat', fontWeight:600, fontSize:13, color:'#222' }}>{name}</div>
                  <div style={{ fontFamily:'Caveat', fontSize:11, color }}>{style}</div>
                </div>
              ))}
            </div>
            <div style={{ fontFamily:'Caveat', fontSize:13, color:'#aaa' }}>+ 7 more investing legends in the library</div>
            <Annot>Heroes revealed after onboarding interview ↓</Annot>
          </div>

          {/* Right: auth form */}
          <div style={{ width:420, display:'flex', flexDirection:'column', justifyContent:'center', padding:'60px 48px', gap:20 }}>
            <div style={{ fontFamily:'Caveat', fontWeight:600, fontSize:28, marginBottom:4 }}>Create your account</div>
            <div style={{ display:'flex', gap:10 }}>
              {['Continue with Google','Continue with Apple'].map((label) => (
                <div key={label} style={{ flex:1, border:'1.5px solid rgba(0,0,0,0.15)', borderRadius:8, padding:'11px', display:'flex', alignItems:'center', justifyContent:'center', gap:6, background:'white', cursor:'default' }}>
                  <div style={{ width:16, height:16, borderRadius:'50%', background:'rgba(0,0,0,0.1)' }} />
                  <div style={{ fontFamily:'Caveat', fontSize:12 }}>{label.split(' ').slice(2).join(' ')}</div>
                </div>
              ))}
            </div>
            <div style={{ display:'flex', gap:10, alignItems:'center' }}>
              <div style={{ flex:1, height:1, background:'rgba(0,0,0,0.1)' }} />
              <div style={{ fontFamily:'Caveat', fontSize:12, color:'#aaa' }}>or with email</div>
              <div style={{ flex:1, height:1, background:'rgba(0,0,0,0.1)' }} />
            </div>
            <WFInput placeholder="Your name" />
            <WFInput placeholder="Email address" />
            <WFInput placeholder="Password" />
            <Btn label="Create account →" style={{ width:'100%', padding:14, borderRadius:8, fontSize:15 }} />
            <div style={{ textAlign:'center', fontFamily:'Caveat', fontSize:13, color:'#888' }}>Already have an account? <span style={{ color:AME, cursor:'default' }}>Sign in</span></div>
            <div style={{ fontFamily:'Caveat', fontSize:11, color:'#aaa', textAlign:'center', lineHeight:1.5 }}>By signing up you agree to our Terms. simFolio uses simulated money only — no real financial transactions occur.</div>
          </div>
        </div>
      );
    }

    /* Sign up — mobile */
    function SignUpMobile() {
      return (
        <div style={{ width:375, height:812, background:'#F5F5EF', display:'flex', flexDirection:'column', border:'2.5px solid #2A2A2A', borderRadius:40, overflow:'hidden' }}>
          <StatusBar />
          <div style={{ height:52, display:'flex', alignItems:'center', padding:'0 20px', borderBottom:'1px solid rgba(0,0,0,0.06)', flexShrink:0 }}>
            <div style={{ fontFamily:'Caveat', fontSize:13, color:AME }}>← Back</div>
            <div style={{ flex:1, textAlign:'center', fontFamily:'Caveat', fontWeight:600, fontSize:17 }}>Create account</div>
          </div>
          <div style={{ flex:1, padding:'24px 24px', display:'flex', flexDirection:'column', gap:14 }}>
            {/* Social first */}
            <div style={{ display:'flex', flexDirection:'column', gap:10 }}>
              {['Continue with Google','Continue with Apple'].map(label => (
                <div key={label} style={{ border:'1.5px solid rgba(0,0,0,0.15)', borderRadius:8, padding:'13px 16px', display:'flex', alignItems:'center', gap:12, background:'white', cursor:'default' }}>
                  <div style={{ width:20, height:20, borderRadius:'50%', background:'rgba(0,0,0,0.08)', flexShrink:0 }} />
                  <div style={{ fontFamily:'Caveat', fontSize:14, color:'#333' }}>{label}</div>
                </div>
              ))}
            </div>
            <div style={{ display:'flex', gap:10, alignItems:'center' }}>
              <div style={{ flex:1, height:1, background:'rgba(0,0,0,0.1)' }} />
              <div style={{ fontFamily:'Caveat', fontSize:12, color:'#aaa' }}>or with email</div>
              <div style={{ flex:1, height:1, background:'rgba(0,0,0,0.1)' }} />
            </div>
            <WFInput placeholder="Your first name" />
            <WFInput placeholder="Email address" />
            <div>
              <WFInput placeholder="Password" />
              <div style={{ fontFamily:'Caveat', fontSize:11, color:'#aaa', marginTop:5 }}>At least 8 characters</div>
            </div>
            {/* Language preference */}
            <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', padding:'10px 14px', background:'rgba(0,0,0,0.04)', borderRadius:8, border:'1px solid rgba(0,0,0,0.09)' }}>
              <div style={{ fontFamily:'Caveat', fontSize:13, color:'#555' }}>Tooltip language</div>
              <div style={{ fontFamily:'Caveat', fontSize:13, color:AME, cursor:'default' }}>繁體中文 →</div>
            </div>
            <Btn label="Create account →" style={{ width:'100%', padding:14, borderRadius:10, fontSize:15 }} />
            <div style={{ fontFamily:'Caveat', fontSize:11, color:'#aaa', textAlign:'center', lineHeight:1.6 }}>By signing up you agree to our Terms.
All investing on simFolio is simulated — no real money.</div>
            <div style={{ textAlign:'center', fontFamily:'Caveat', fontSize:13, color:'#888' }}>Already have an account? <span style={{ color:AME, cursor:'default' }}>Sign in</span></div>
          </div>
        </div>
      );
    }

    /* Sign in — mobile */
    function SignInMobile() {
      return (
        <div style={{ width:375, height:720, background:'#F5F5EF', display:'flex', flexDirection:'column', border:'2.5px solid #2A2A2A', borderRadius:40, overflow:'hidden' }}>
          <StatusBar />
          <div style={{ height:52, display:'flex', alignItems:'center', padding:'0 20px', borderBottom:'1px solid rgba(0,0,0,0.06)', flexShrink:0 }}>
            <div style={{ fontFamily:'Caveat', fontSize:13, color:AME }}>← Back</div>
            <div style={{ flex:1, textAlign:'center', fontFamily:'Caveat', fontWeight:600, fontSize:17 }}>Sign in</div>
          </div>
          <div style={{ flex:1, padding:'28px 24px', display:'flex', flexDirection:'column', gap:14 }}>
            <div style={{ display:'flex', flexDirection:'column', gap:10 }}>
              {['Continue with Google','Continue with Apple'].map(label => (
                <div key={label} style={{ border:'1.5px solid rgba(0,0,0,0.15)', borderRadius:8, padding:'13px 16px', display:'flex', alignItems:'center', gap:12, background:'white', cursor:'default' }}>
                  <div style={{ width:20, height:20, borderRadius:'50%', background:'rgba(0,0,0,0.08)', flexShrink:0 }} />
                  <div style={{ fontFamily:'Caveat', fontSize:14 }}>{label}</div>
                </div>
              ))}
            </div>
            <div style={{ display:'flex', gap:10, alignItems:'center' }}>
              <div style={{ flex:1, height:1, background:'rgba(0,0,0,0.1)' }} />
              <div style={{ fontFamily:'Caveat', fontSize:12, color:'#aaa' }}>or with email</div>
              <div style={{ flex:1, height:1, background:'rgba(0,0,0,0.1)' }} />
            </div>
            <WFInput placeholder="Email address" />
            <div>
              <WFInput placeholder="Password" />
              <div style={{ display:'flex', justifyContent:'flex-end', marginTop:6 }}>
                <div style={{ fontFamily:'Caveat', fontSize:13, color:AME, cursor:'default' }}>Forgot password?</div>
              </div>
            </div>
            <Btn label="Sign in →" style={{ width:'100%', padding:14, borderRadius:10, fontSize:15 }} />
            <div style={{ textAlign:'center', fontFamily:'Caveat', fontSize:13, color:'#888', marginTop:4 }}>New here? <span style={{ color:AME, cursor:'default' }}>Create an account</span></div>
          </div>
        </div>
      );
    }

    /* Forgot password — mobile */
    function ForgotPassword() {
      return (
        <div style={{ width:375, height:580, background:'#F5F5EF', display:'flex', flexDirection:'column', border:'2.5px solid #2A2A2A', borderRadius:40, overflow:'hidden' }}>
          <StatusBar />
          <div style={{ height:52, display:'flex', alignItems:'center', padding:'0 20px', borderBottom:'1px solid rgba(0,0,0,0.06)', flexShrink:0 }}>
            <div style={{ fontFamily:'Caveat', fontSize:13, color:AME }}>← Sign in</div>
            <div style={{ flex:1, textAlign:'center', fontFamily:'Caveat', fontWeight:600, fontSize:17 }}>Reset password</div>
          </div>
          <div style={{ flex:1, padding:'28px 24px', display:'flex', flexDirection:'column', gap:16 }}>
            <div style={{ fontFamily:'Caveat', fontSize:14, color:'#555', lineHeight:1.6 }}>Enter your email and we’ll send you a link to reset your password. The link expires in 1 hour.</div>
            <WFInput placeholder="Email address" />
            <Btn label="Send reset link" style={{ width:'100%', padding:14, borderRadius:10, fontSize:15 }} />
            <div style={{ textAlign:'center', fontFamily:'Caveat', fontSize:13, color:'#aaa' }}>Check your inbox — including spam.</div>
          </div>
        </div>
      );
    }

    /* Returning user — quick resume */
    function ReturningUser() {
      return (
        <div style={{ width:375, height:620, background:'#F5F5EF', display:'flex', flexDirection:'column', border:'2.5px solid #2A2A2A', borderRadius:40, overflow:'hidden' }}>
          <StatusBar />
          <div style={{ flex:1, padding:'40px 28px 32px', display:'flex', flexDirection:'column', gap:20, alignItems:'center', justifyContent:'center' }}>
            <div style={{ textAlign:'center' }}>
              <div style={{ fontFamily:'Caveat', fontWeight:600, fontSize:28, marginBottom:6 }}>Welcome back, Jamie</div>
              <div style={{ fontFamily:'Caveat', fontSize:14, color:'#888', lineHeight:1.5 }}>Your portfolio is up <span style={{ color:AQUA, fontWeight:600 }}>+$1,120</span> since your last visit.</div>
            </div>
            {/* Quick stats */}
            <div style={{ width:'100%', background:'white', border:'1px solid rgba(0,0,0,0.08)', borderRadius:8, padding:'0 16px' }}>
              {[['Portfolio value','$28,340'],['Last visited','3 days ago'],['Pending orders','2']].map(([l,v],i,arr) => (
                <div key={l} style={{ display:'flex', justifyContent:'space-between', padding:'10px 0', borderBottom:i<arr.length-1?'1px solid rgba(0,0,0,0.06)':undefined }}>
                  <div style={{ fontFamily:'Caveat', fontSize:13, color:'#888' }}>{l}</div>
                  <div style={{ fontFamily:'Caveat', fontWeight:600, fontSize:13 }}>{v}</div>
                </div>
              ))}
            </div>
            {/* Biometric / quick sign-in */}
            <div style={{ width:'100%', display:'flex', flexDirection:'column', gap:10 }}>
              <div style={{ border:'1.5px solid rgba(0,0,0,0.15)', borderRadius:8, padding:'13px 16px', display:'flex', alignItems:'center', justifyContent:'center', gap:10, background:'white', cursor:'default' }}>
                <div style={{ width:20, height:20, background:'rgba(0,0,0,0.08)', borderRadius:4 }} />
                <div style={{ fontFamily:'Caveat', fontSize:14 }}>Sign in with Face ID</div>
              </div>
              <Btn label="Continue to portfolio →" style={{ width:'100%', padding:14, borderRadius:10, fontSize:15 }} />
              <div style={{ textAlign:'center', fontFamily:'Caveat', fontSize:13, color:'#aaa', cursor:'default' }}>Not Jamie? Sign out</div>
            </div>
          </div>
        </div>
      );
    }

    /* ── Guide primitives ─────────────────────────────────────────── */
    function GuideAv({ size = 36 }) {

          <DCSection id="onboard" title="01 — Onboarding: Full first-time flow" subtitle="8-question interview (goal always first, rest randomized) → stock interest → trade walkthrough → Hero introduced post-trade. Heroes never appear until user has real skin in the game.">
            <DCArtboard id="ob-1" label="State 1 — Goal question (1/8)" width={375} height={900}><OnboardGoal /></DCArtboard>

            <DCArtboard id="ob-4" label="State 4 — Which stock first?" width={375} height={760}><OnboardWhichFirst /></DCArtboard>
            <DCArtboard id="ob-5" label="State 5 — Trade walkthrough (Sage guides)" width={375} height={900}><OnboardTradeWalk /></DCArtboard>
            <DCArtboard id="ob-6" label="State 6 — Post-trade: Sage introduces Hero" width={375} height={820}><OnboardHeroIntro /></DCArtboard>

            <DCArtboard id="pa-l" label="Light mode" width={1440} height={900}><PortfolioA dark={false} /></DCArtboard>
            <DCArtboard id="pa-d" label="Dark mode" width={1440} height={900}><PortfolioA dark={true} /></DCArtboard>
          </DCSection>

          <DCSection id="pb" title="02B — Portfolio: The Advisor's Room" subtitle="Classic portfolio view with a persistent Hero sidebar. Tabbed between the 3 heroes. Sidebar docks to all screens.">

            <DCArtboard id="pb-d" label="Dark mode" width={1440} height={900}><PortfolioB dark={true} /></DCArtboard>

          <DCSection id="pc" title="02C — Portfolio: The Flight Deck" subtitle="Hero strip replaces the top nav entirely. Heroes are always present as co-pilots. Metrics row below the strip.">

            <DCArtboard id="hc-desk" label="Desktop: expanded panel" width={1440} height={900}><HeroConsultDesktop /></DCArtboard>
          </DCSection>

          <DCSection id="tr" title="04 — Trade Flow" subtitle="Hero commentary appears before the trade — not after. Warren weighs in on the specific stock at the moment of decision.">

            <DCArtboard id="tr-desk" label="Desktop: stock + order + hero" width={1440} height={900}><TradeDesktop /></DCArtboard>
