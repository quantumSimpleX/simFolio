<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>simFolio — Wireframes 04: Mature Portfolio + Learn-as-you-do</title>
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script type="text/babel" src="design-canvas.jsx"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    .wf-img { background-color: rgba(0,0,0,0.07); background-image: repeating-linear-gradient(45deg,transparent,transparent 5px,rgba(0,0,0,0.05) 5px,rgba(0,0,0,0.06) 6px); }
    .wf-img-dk { background-color: rgba(255,255,255,0.04); background-image: repeating-linear-gradient(45deg,transparent,transparent 5px,rgba(255,255,255,0.03) 5px,rgba(255,255,255,0.03) 6px); }
    .term { border-bottom: 1.5px dotted #8A60EB; cursor: pointer; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { DesignCanvas, DCSection, DCArtboard } = window;
  const AME = '#8A60EB';
  const AQUA = '#1FC3A4';
  const GOLD = '#C99A2E';
  const f = 'Caveat';

  /* heroes */
  const WB = { init:'WB', name:'Warren Buffett', short:'Warren', color:AME };
  const CW = { init:'CW', name:'Cathie Wood',    short:'Cathie', color:AQUA };
  const RD = { init:'RD', name:'Ray Dalio',       short:'Ray',    color:GOLD };

  /* ── theme ───────────────────────────────────────────────────── */
  function T(dk) {
    return {
      bg:          dk ? '#13131F' : '#F5F5EF',
      surface:     dk ? 'rgba(255,255,255,0.04)' : 'rgba(0,0,0,0.04)',
      surfaceB:    dk ? 'rgba(255,255,255,0.08)' : 'rgba(0,0,0,0.08)',
      border:      dk ? 'rgba(255,255,255,0.07)' : 'rgba(0,0,0,0.09)',
      borderDash:  dk ? 'rgba(255,255,255,0.12)' : 'rgba(0,0,0,0.13)',
      fg:          dk ? '#DDDDF0' : '#222',
      fgMuted:     dk ? '#5A5A78' : '#888',
      accentSurf:  dk ? 'rgba(138,96,235,0.12)' : 'rgba(138,96,235,0.06)',
      accentB:     'rgba(138,96,235,0.25)',
      img:         dk ? 'wf-img-dk' : 'wf-img',
    };
  }

  /* ── primitives ──────────────────────────────────────────────── */
  function Av({ size=40, init='WB', color=AME, dk=false, style={} }) {
    return <div style={{ width:size, height:size, borderRadius:'50%', background: dk?'rgba(255,255,255,0.08)':'rgba(0,0,0,0.08)', display:'flex', alignItems:'center', justifyContent:'center', fontFamily:f, fontWeight:600, fontSize:Math.round(size*0.34), color, flexShrink:0, ...style }}>{init}</div>;
  }
  function Box({ w, h, label, dk=false, style={} }) {
    const t=T(dk);
    return <div style={{ width:w, height:h, background:t.surface, border:`1.5px dashed ${t.borderDash}`, borderRadius:4, display:'flex', alignItems:'center', justifyContent:'center', fontFamily:f, fontSize:11, color:t.fgMuted, textAlign:'center', padding:4, ...style }}>{label}</div>;
  }
  function Btn({ label, style={}, ghost=false, small=false }) {
    return <div style={{ background:ghost?'transparent':AME, color:ghost?AME:'white', border:ghost?`1.5px solid ${AME}`:'none', borderRadius:6, padding: small?'7px 14px':'11px 22px', fontFamily:f, fontSize: small?12:14, fontWeight:600, display:'inline-flex', alignItems:'center', justifyContent:'center', cursor:'default', flexShrink:0, ...style }}>{label}</div>;
  }
  function Input({ placeholder, dk=false, highlight=false, style={} }) {
    const t=T(dk);
    return <div style={{ background:highlight?'rgba(138,96,235,0.06)':t.surface, border:`1.5px solid ${highlight?AME:t.borderDash}`, borderRadius:6, padding:'10px 14px', fontFamily:f, fontSize:13, color:t.fgMuted, ...style }}>{placeholder}</div>;
  }
  function StatusBar({ dk=false }) {
    return <div style={{ height:44, background: dk?'rgba(255,255,255,0.03)':'rgba(0,0,0,0.05)', display:'flex', alignItems:'center', justifyContent:'space-between', padding:'0 20px', fontFamily:f, fontSize:12, color:'#888', flexShrink:0 }}><span>9:41</span><span>●●● ▌ 100%</span></div>;
  }
  function NavBar({ dk=false, children }) {
    const t=T(dk);
    return <div style={{ height:64, borderBottom:`1.5px solid ${t.border}`, display:'flex', alignItems:'center', padding:'0 40px', gap:32, flexShrink:0, background:t.bg }}>{children}</div>;
  }
  function UserBubble({ text, dk=false }) {
    return <div style={{ background:'rgba(31,195,164,0.1)', border:'1.5px solid rgba(31,195,164,0.2)', borderRadius:'12px 0 12px 12px', padding:'10px 14px', fontFamily:f, fontSize:13, lineHeight:1.4, color:dk?'#DDDDF0':'#222', maxWidth:260, alignSelf:'flex-end' }}>{text}</div>;
  }
  function HeroMsg({ hero, text, dk=false }) {
    return (
      <div style={{ display:'flex', gap:8 }}>
        <Av size={28} init={hero.init} color={hero.color} dk={dk} />
        <div>
          <div style={{ fontFamily:f, fontSize:11, color:hero.color, fontWeight:600, marginBottom:3 }}>{hero.short}</div>
          <div style={{ background:dk?'rgba(255,255,255,0.04)':'rgba(0,0,0,0.04)', borderLeft:`3px solid ${hero.color}`, borderRadius:'0 10px 10px 0', padding:'10px 14px', fontFamily:f, fontSize:13, lineHeight:1.4, color:dk?'#DDDDF0':'#222', maxWidth:265 }}>{text}</div>
        </div>
      </div>
    );
  }
  function SL({ children, dk=false }) { /* section label */
    return <div style={{ fontFamily:f, fontSize:10, textTransform:'uppercase', letterSpacing:'0.13em', color:T(dk).fgMuted, marginBottom:7 }}>{children}</div>;
  }
  function Annot({ children, style={} }) {
    return <div style={{ fontFamily:f, fontSize:11, color:AME, fontStyle:'italic', lineHeight:1.3, ...style }}>{children}</div>;
  }
  function Divider({ label }) {
    return (
      <div style={{ display:'flex', alignItems:'center', gap:10 }}>
        <div style={{ flex:1, height:1, background:'rgba(0,0,0,0.08)' }} />
        <div style={{ fontFamily:f, fontSize:11, color:'#bbb' }}>{label}</div>
        <div style={{ flex:1, height:1, background:'rgba(0,0,0,0.08)' }} />
      </div>
    );
  }

  /* council header stack */
  function CouncilHeader({ heroes, dk=false }) {
    const t=T(dk);
    return (
      <div style={{ height:56, display:'flex', alignItems:'center', gap:12, padding:'0 20px', borderBottom:`1px solid ${t.border}`, flexShrink:0, background:t.bg }}>
        <div style={{ display:'flex' }}>
          {heroes.map((h,i) => <Av key={h.init} size={32} init={h.init} color={h.color} dk={dk} style={{ marginLeft:i>0?-10:0, border:`2px solid ${dk?'#13131F':'#F5F5EF'}` }} />)}
        </div>
        <div>
          <div style={{ fontFamily:f, fontWeight:600, fontSize:15, color:t.fg }}>{heroes.length===1?heroes[0].name:'Your Council'}</div>
          <div style={{ fontFamily:f, fontSize:11, color:heroes[0].color }}>{heroes.length===1?'Your advisor':heroes.map(h=>h.short).join(' · ')}</div>
        </div>
      </div>
    );
  }

  /* chat input bar showing active heroes */
  function ChatBar({ heroes, placeholder='Ask anything…', dk=false }) {
    const t=T(dk);
    return (
      <div style={{ padding:'10px 20px 24px', borderTop:`1px solid ${t.border}`, display:'flex', gap:8, alignItems:'center', flexShrink:0, background:t.bg }}>
        {heroes.map((h,i) => <Av key={h.init} size={22} init={h.init} color={h.color} dk={dk} style={{ marginRight:i<heroes.length-1?-6:4 }} />)}
        <Input placeholder={placeholder} dk={dk} style={{ flex:1 }} />
        <Btn label="→" style={{ padding:'10px 14px', borderRadius:8 }} />
      </div>
    );
  }

  /* sidebar tabs */
  function SidebarTabs({ tabs, active, dk=false }) {
    const t=T(dk);
    return (
      <div style={{ height:46, display:'flex', borderBottom:`1px solid ${t.border}`, flexShrink:0, background:t.bg }}>
        {tabs.map(({ label, color, isActive }) => (
          <div key={label} style={{ flex:1, display:'flex', alignItems:'center', justifyContent:'center', fontFamily:f, fontWeight:isActive?600:400, fontSize:13, color:isActive?(color||AME):t.fgMuted, borderBottom:isActive?`2.5px solid ${color||AME}`:'none', cursor:'default' }}>{label}</div>
        ))}
      </div>
    );
  }

  /* holdings row */
  function Holding({ ticker, name, qty, value, pct, pctColor, dk=false }) {
    const t=T(dk);
    return (
      <div style={{ display:'flex', alignItems:'center', padding:'9px 0', borderBottom:`1px solid ${t.border}`, gap:10 }}>
        <div style={{ width:36, height:36, background:t.surface, border:`1.5px dashed ${t.borderDash}`, borderRadius:4, display:'flex', alignItems:'center', justifyContent:'center', fontFamily:f, fontSize:10, fontWeight:600, color:t.fgMuted, flexShrink:0 }}>{ticker}</div>
        <div style={{ flex:1 }}>
          <div style={{ fontFamily:f, fontWeight:600, fontSize:13, color:t.fg }}>{name}</div>
          <div style={{ fontFamily:f, fontSize:11, color:t.fgMuted }}>{qty}</div>
        </div>
        <div style={{ textAlign:'right' }}>
          <div style={{ fontFamily:f, fontWeight:600, fontSize:13, color:t.fg }}>{value}</div>
          {pct && <div style={{ fontFamily:f, fontSize:11, color:pctColor }}>{pct}</div>}
        </div>
      </div>
    );
  }

  /* nudge card — soft, dismissible */
  function NudgeCard({ hero, text, dk=false }) {
    const t=T(dk);
    return (
      <div style={{ border:`1.5px dashed ${t.accentB}`, borderRadius:8, padding:'12px 14px', background:t.accentSurf, display:'flex', gap:10, alignItems:'flex-start' }}>
        <Av size={32} init={hero.init} color={hero.color} dk={dk} />
        <div style={{ flex:1 }}>
          <div style={{ fontFamily:f, fontSize:11, color:hero.color, fontWeight:600, marginBottom:4 }}>{hero.short.toUpperCase()} SUGGESTS</div>
          <div style={{ fontFamily:f, fontSize:13, color:t.fg, lineHeight:1.4 }}>{text}</div>
        </div>
        <div style={{ fontFamily:f, fontSize:12, color:t.fgMuted, cursor:'default', flexShrink:0 }}>Skip ×</div>
      </div>
    );
  }

  /* inline learn card — appears at decision point */
  function LearnCard({ title, body, hero, dk=false }) {
    const t=T(dk);
    return (
      <div style={{ background:dk?'rgba(138,96,235,0.1)':'rgba(138,96,235,0.05)', border:`1.5px solid ${AME}33`, borderRadius:8, padding:14 }}>
        <div style={{ fontFamily:f, fontSize:10, textTransform:'uppercase', letterSpacing:'0.13em', color:AME, marginBottom:6 }}>{title}</div>
        <div style={{ fontFamily:f, fontSize:13, color:t.fg, lineHeight:1.5, marginBottom: hero?10:0 }}>{body}</div>
        {hero && (
          <div style={{ display:'flex', gap:8, alignItems:'flex-start' }}>
            <Av size={22} init={hero.init} color={hero.color} dk={dk} />
            <div style={{ fontFamily:f, fontSize:12, color:hero.color, fontStyle:'italic', lineHeight:1.4 }}>{hero.short} can explain more — just ask.</div>
          </div>
        )}
      </div>
    );
  }

  /* quick prompt chips */
  function QuickPrompts({ prompts, color=AME }) {
    return (
      <div style={{ display:'flex', gap:6, flexWrap:'wrap', paddingLeft:0 }}>
        {prompts.map(p => (
          <div key={p} style={{ border:`1.5px solid ${color}44`, borderRadius:999, padding:'5px 12px', fontFamily:f, fontSize:12, color, cursor:'default', background:`${color}08` }}>{p}</div>
        ))}
      </div>
    );
  }

  /* ═══════════════════════════════════════════════════════════════
     SECTION 01 — Portfolio 02B: Mature state (light + dark)
  ═══════════════════════════════════════════════════════════════ */

  function PortfolioMature({ dk=false }) {
    const t=T(dk);
    const heroes3=[WB,CW,RD];
    return (
      <div style={{ width:1440, height:900, background:t.bg, color:t.fg, display:'flex', flexDirection:'column' }}>
        <NavBar dk={dk}>
          <div style={{ fontFamily:f, fontWeight:600, fontSize:20, color:t.fg }}>simFolio</div>
          <div style={{ flex:1, display:'flex', gap:24, fontFamily:f, fontSize:15, color:t.fgMuted }}>
            <span style={{ color:AME, fontWeight:600 }}>Portfolio</span>
            <span>Markets</span>
            <span>Achievements</span>
          </div>
          <div style={{ fontFamily:f, fontSize:13, color:t.fgMuted }}>Cash: <strong style={{ color:t.fg }}>$3,412</strong></div>
          <Av size={34} init="J" dk={dk} />
        </NavBar>

        <div style={{ flex:1, display:'flex', minHeight:0 }}>
          {/* Main */}
          <div style={{ flex:1, padding:'28px 40px', display:'flex', flexDirection:'column', gap:18, overflow:'hidden' }}>
            <div style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-end' }}>
              <div>
                <div style={{ fontFamily:f, fontWeight:600, fontSize:34, color:t.fg }}>$28,340.00</div>
                <div style={{ fontFamily:f, fontSize:14, color:AQUA }}>+$8,340 since you started (+41.7%)</div>
              </div>
              <div style={{ display:'flex', gap:8 }}>
                {['1W','1M','3M','1Y','All'].map((l,i) => (
                  <div key={l} style={{ padding:'5px 12px', borderRadius:4, fontFamily:f, fontSize:13, background:i===3?AME:'transparent', color:i===3?'white':t.fgMuted, cursor:'default' }}>{l}</div>
                ))}
              </div>
            </div>

            <div className={t.img} style={{ height:180, borderRadius:8 }} />

            <div>
              <SL dk={dk}>Holdings · 6 positions</SL>
              {[
                ['AAPL','Apple Inc.','31 sh','$11,420','+$5,420 (+90.3%)',AQUA],
                ['NVDA','Nvidia','8 sh','$7,240','+$3,040 (+72.4%)',AQUA],
                ['TSLA','Tesla','5 sh','$3,015','+$1,015 (+50.8%)',AQUA],
                ['BTC','Bitcoin','0.08 BTC','$2,253','+$253 (+12.6%)',AQUA],
                ['VTI','Vanguard Total','10 sh','$1,000','+$0 (+0.0%)','#888'],
              ].map(([ticker,name,qty,val,pct,pc]) => (
                <Holding key={ticker} ticker={ticker} name={name} qty={qty} value={val} pct={pct} pctColor={pc} dk={dk} />
              ))}
              <div style={{ padding:'12px 0', display:'flex', gap:10 }}>
                <Btn label="+ Add position" small style={{ borderRadius:6 }} />
                <Btn label="Review portfolio" small ghost style={{ borderRadius:6 }} />
              </div>
            </div>
          </div>

          {/* Sidebar: 3 heroes, tabs */}
          <div style={{ width:360, borderLeft:`1.5px solid ${t.border}`, display:'flex', flexDirection:'column', background:t.bg }}>
            <SidebarTabs dk={dk} tabs={[
              { label:'Council', color:AME, isActive:true },
              { label:'Warren', color:AME, isActive:false },
              { label:'Cathie', color:AQUA, isActive:false },
              { label:'Ray', color:GOLD, isActive:false },
            ]} />

            <div style={{ flex:1, padding:'14px 20px 12px', display:'flex', flexDirection:'column', gap:12, overflow:'hidden' }}>
              {/* Council header */}
              <div style={{ display:'flex', gap:6, alignItems:'center' }}>
                {heroes3.map((h,i) => <Av key={h.init} size={28} init={h.init} color={h.color} dk={dk} style={{ marginRight:i<2?-6:4 }} />)}
                <div style={{ fontFamily:f, fontSize:12, color:t.fgMuted, marginLeft:8 }}>Full council · 3 of 3</div>
              </div>

              {/* Quick prompts */}
              <QuickPrompts prompts={['Review my portfolio','What should I sell?','Am I too concentrated?']} />

              {/* Chat */}
              <HeroMsg hero={RD} text="Your portfolio has significant tech concentration — AAPL + NVDA + TSLA is over 80%. Worth discussing." dk={dk} />
              <UserBubble text="Should I diversify?" dk={dk} />
              <HeroMsg hero={WB} text="Diversification is protection against ignorance. You know these businesses — that changes the calculus." dk={dk} />
              <HeroMsg hero={CW} text="I'd hold. The AI infrastructure thesis is still early. Concentration in the right names isn't risk — it's conviction." dk={dk} />
              <HeroMsg hero={RD} text="We disagree — which is good. Let me show you how I'd think about balancing this." dk={dk} />

              <div style={{ flex:1 }} />
            </div>

            <ChatBar heroes={heroes3} placeholder="Ask your council anything…" dk={dk} />
          </div>
        </div>
      </div>
    );
  }

  /* Mobile portfolio (mature) */
  function PortfolioMatureMobile({ dk=false }) {
    const t=T(dk);
    return (
      <div style={{ width:375, height:900, background:t.bg, display:'flex', flexDirection:'column', border:'2.5px solid #2A2A2A', borderRadius:40, overflow:'hidden' }}>
        <StatusBar dk={dk} />
        <div style={{ height:52, display:'flex', alignItems:'center', justifyContent:'space-between', padding:'0 20px', borderBottom:`1px solid ${t.border}`, flexShrink:0 }}>
          <div style={{ fontFamily:f, fontWeight:600, fontSize:18, color:t.fg }}>simFolio</div>
          {/* 3 hero avatars stacked */}
          <div style={{ display:'flex' }}>
            {[WB,CW,RD].map((h,i) => <Av key={h.init} size={28} init={h.init} color={h.color} dk={dk} style={{ marginLeft:i>0?-8:0, border:`2px solid ${dk?'#13131F':'#F5F5EF'}` }} />)}
          </div>
        </div>

        <div style={{ flex:1, padding:'16px 20px', display:'flex', flexDirection:'column', gap:14, overflow:'hidden' }}>
          <div>
            <div style={{ fontFamily:f, fontWeight:600, fontSize:28, color:t.fg }}>$28,340</div>
            <div style={{ fontFamily:f, fontSize:13, color:AQUA }}>+$8,340 (+41.7%) all time</div>
          </div>
          <div className={t.img} style={{ height:80, borderRadius:6 }} />

          <div>
            <SL dk={dk}>Holdings</SL>
            {[['AAPL','31 sh','$11,420',AQUA],['NVDA','8 sh','$7,240',AQUA],['TSLA','5 sh','$3,015',AQUA],['BTC','0.08','$2,253',AQUA]].map(([ticker,qty,val,pc]) => (
              <Holding key={ticker} ticker={ticker} name="" qty={qty} value={val} pct="" pctColor={pc} dk={dk} />
            ))}
          </div>

          {/* Council nudge - optional, dismissible */}
          <NudgeCard hero={RD} text="Ray has thoughts on your concentration. Tap to hear — or skip." dk={dk} />
        </div>

        {/* Bottom tab bar */}
        <div style={{ height:56, borderTop:`1px solid ${t.border}`, display:'flex', alignItems:'center', justifyContent:'space-around', flexShrink:0, background:t.bg }}>
          {[['Portfolio',true],['Trade',false],['Ask',false],['Learn',false]].map(([label,active]) => (
            <div key={label} style={{ display:'flex', flexDirection:'column', alignItems:'center', gap:2 }}>
              <div style={{ width:20, height:20, background: active?AME:'rgba(0,0,0,0.1)', borderRadius:4 }} />
              <div style={{ fontFamily:f, fontSize:10, color:active?AME:t.fgMuted }}>{label}</div>
            </div>
          ))}
        </div>
      </div>
    );
  }

  /* ═══════════════════════════════════════════════════════════════
     SECTION 02 — Learn-as-you-do: inline education moments
  ═══════════════════════════════════════════════════════════════ */

  /* 2A: Hero comment appears inline while sizing a position */
  function LearnPositionSizing() {
    return (
      <div style={{ width:375, height:920, background:'#F5F5EF', display:'flex', flexDirection:'column', border:'2.5px solid #2A2A2A', borderRadius:40, overflow:'hidden' }}>
        <StatusBar />
        <div style={{ height:52, display:'flex', alignItems:'center', padding:'0 20px', borderBottom:'1px solid rgba(0,0,0,0.06)', flexShrink:0 }}>
          <div style={{ fontFamily:f, fontSize:13, color:AME }}>←</div>
          <div style={{ flex:1, textAlign:'center', fontFamily:f, fontWeight:600, fontSize:16 }}>Buy NVDA</div>
          <div style={{ fontFamily:f, fontSize:12, color:AQUA }}>Mkt open</div>
        </div>
        <div style={{ flex:1, padding:'16px 20px', display:'flex', flexDirection:'column', gap:13, overflow:'hidden' }}>
          <div style={{ display:'flex', justifyContent:'space-between', alignItems:'baseline' }}>
            <div style={{ fontFamily:f, fontWeight:600, fontSize:26 }}>$905.12</div>
            <div style={{ fontFamily:f, fontSize:12, color:AQUA }}>+1.8% today</div>
          </div>
          <div className="wf-img" style={{ height:56, borderRadius:6 }} />

          {/* Order type */}
          <div>
            <div style={{ fontFamily:f, fontSize:12, color:'#888', marginBottom:6 }}>Order type</div>
            <div style={{ display:'flex', background:'rgba(0,0,0,0.04)', borderRadius:6, overflow:'hidden' }}>
              {['Market order','Limit order'].map((tab,i) => (
                <div key={tab} style={{ flex:1, padding:'9px', textAlign:'center', fontFamily:f, fontSize:13, background:i===0?AME:'transparent', color:i===0?'white':'#888', borderRadius:i===0?6:0 }}>{tab}</div>
              ))}
            </div>
          </div>

          {/* Quantity — user typed 15 */}
          <div>
            <div style={{ fontFamily:f, fontSize:12, color:'#888', marginBottom:6 }}>Shares</div>
            <Input placeholder="15" highlight style={{ textAlign:'center', fontSize:22, fontWeight:600 }} />
          </div>

          {/* Inline learn moment — triggers when qty pushes concentration > 30% */}
          <LearnCard
            title="Heads up — position size"
            body="15 shares of NVDA at $905 = $13,575. That's 48% of your portfolio in one stock. Not necessarily wrong — but worth knowing."
            hero={WB}
          />

          {/* Warren weighs in automatically — not intrusively */}
          <HeroMsg hero={WB} text="I'd think carefully here. High conviction is good — but 48% in a single name means Nvidia's mood is your portfolio's mood." />
          <QuickPrompts prompts={['What size is safe?','I understand the risk','Tell me more about NVDA']} />

          <Box w="100%" h={44} label="Total: $13,575 · Cash after: $837" style={{ fontSize:12 }} />
          <Btn label="Buy 15 NVDA" style={{ width:'100%', padding:13, borderRadius:8 }} />
        </div>
      </div>
    );
  }

  /* 2B: Hero explains a concept right when the user encounters it */
  function LearnPERatio() {

        <DCSection id="learn-do" title="02 — Learn-as-you-do: inline education at decision points" subtitle="Education is never in a separate screen. It appears at the moment of the decision — position sizing, valuation, conflicting views. Hero is always one tap away.">
          <DCArtboard id="ld-1" label="2A — Position sizing: inline concentration warning" width={375} height={920}><LearnPositionSizing /></DCArtboard>
          <DCArtboard id="ld-2" label="2B — P/E ratio: tooltip + hero explains at moment of interest" width={375} height={900}><LearnPERatio /></DCArtboard>
          <DCArtboard id="ld-3" label="2C — Council disagrees: 3 views side by side (the lesson)" width={800} height={580}><LearnConflictingViews /></DCArtboard>
        </DCSection>

        <DCSection id="hero-qa" title="03 — Free-form hero Q&A: always available" subtitle="'Ask' tab on mobile or panel expand on desktop — user can consult the council at any moment, on any topic. Quick prompts reduce friction. Multi-hero responses are the norm.">
          <DCArtboard id="qa-mob" label="Mobile: full-screen council chat (Ask tab)" width={375} height={900}><HeroQAMobile /></DCArtboard>
          <DCArtboard id="qa-desk" label="Desktop: expanded hero panel, portfolio dimmed" width={1440} height={900}><HeroQADesktop /></DCArtboard>
        </DCSection>

        <DCSection id="review" title="04 — Portfolio review: user-initiated, never forced" subtitle="A soft weekly nudge — always skippable, no guilt. When the user accepts, the hero walks through what happened, teaches the concept behind each move, and invites questions. No scheduled lessons.">
          <DCArtboard id="rv-nudge" label="4A — Soft weekly nudge (dismissible)" width={375} height={780}><ReviewNudgeMobile /></DCArtboard>
          <DCArtboard id="rv-session-mob" label="4B — Review session: hero-led, mobile" width={375} height={960}><ReviewSession /></DCArtboard>
          <DCArtboard id="rv-session-desk" label="4C — Review session: hero-led, desktop" width={1440} height={900}><ReviewDesktop /></DCArtboard>
        </DCSection>

        <DCSection id="third-hero" title="05 — Third hero joins: introduced by hero 2, not hero 1" subtitle="The pattern: user shows interest in a topic outside hero 2's expertise → hero 2 introduces hero 3. User never picks directly. Max 3 heroes. Full council shares one chat window.">
          <DCArtboard id="th-1" label="Ray Dalio joins via Cathie + Warren" width={375} height={920}><ThirdHeroIntro /></DCArtboard>
        </DCSection>

      </DesignCanvas>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
