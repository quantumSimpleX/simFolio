<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>simFolio — Hi-fi Portfolio v1</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script type="text/babel" src="design-canvas.jsx"></script>
  <style>
    @font-face {
      font-family: 'MOMCAKE';
      src: url('fonts/MOMCAKE-Bold.otf') format('opentype');
      font-weight: 700;
      font-display: swap;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { DesignCanvas, DCSection, DCArtboard } = window;

  const C = {
    paper: '#FAFAF7', white: '#FFFFFF',
    ink900: '#0A0E14', ink700: '#242B35', ink600: '#3A434F',
    ink500: '#5A6573', ink400: '#7E8794', ink300: '#A6ADB7',
    ink200: '#CDD2D9', ink100: '#E6E9ED', ink50: '#F4F5F7',
    ame400: '#8A60EB', ame600: '#582EB3', ame100: '#E2D8FC', ame50: '#F2EEFE',
    aqua400: '#1FC3A4', aqua600: '#008771', aqua50: '#E6FBF7',
    red: '#D43A2F', redBg: '#FDF1F0',
    gold: '#B5860A', goldBg: '#FBF5E6',
  };
  const SANS = "'Barlow Condensed', 'Helvetica Neue', system-ui, sans-serif";
  const DISPLAY = "'MOMCAKE', 'Helvetica Neue', system-ui, sans-serif";

  /* ── shared ── */
  function Logo({ size = 20 }) {
    return (
      <div style={{ display: 'flex', alignItems: 'center', gap: 7 }}>
        <div style={{ width: size * 1.1, height: size * 1.1, background: `${C.ame400}12`, border: `1.5px solid ${C.ame400}28`, borderRadius: 3, display: 'flex', alignItems: 'center', justifyContent: 'center', color: C.ame400, fontSize: size * 0.6 }}>◇</div>
        <div style={{ fontFamily: DISPLAY, fontWeight: 700, fontSize: size, color: C.ink900, letterSpacing: '-0.02em' }}>simFolio</div>
      </div>
    );
  }

  function HeroAv({ init, color, size = 36, style = {} }) {
    return (
      <div style={{ width: size, height: size, borderRadius: '50%', background: `${color}12`, border: `1.5px solid ${color}35`, display: 'flex', alignItems: 'center', justifyContent: 'center', fontFamily: SANS, fontWeight: 700, fontSize: size * 0.3, color, flexShrink: 0, letterSpacing: '-0.01em', ...style }}>{init}</div>
    );
  }

  function Eyebrow({ children, color = C.ink400 }) {
    return <div style={{ fontFamily: SANS, fontSize: 11, fontWeight: 600, color, letterSpacing: '0.14em', textTransform: 'uppercase' }}>{children}</div>;
  }

  /* Minimal sparkline — clean single line, no fill, aqua */
  function Sparkline({ width, height, positive = true, style = {} }) {
    const color = positive ? C.aqua400 : C.red;
    /* gentle upward curve */
    const pts = positive
      ? `0,${height} ${width*0.08},${height*0.85} ${width*0.2},${height*0.78} ${width*0.35},${height*0.62} ${width*0.5},${height*0.48} ${width*0.65},${height*0.38} ${width*0.8},${height*0.28} ${width*0.9},${height*0.22} ${width},${height*0.12}`
      : `0,${height*0.12} ${width*0.15},${height*0.2} ${width*0.3},${height*0.3} ${width*0.5},${height*0.45} ${width*0.7},${height*0.6} ${width*0.85},${height*0.72} ${width},${height*0.85}`;
    return (
      <svg width={width} height={height} viewBox={`0 0 ${width} ${height}`} preserveAspectRatio="none" style={style}>
        <polyline points={pts} fill="none" stroke={color} strokeWidth="1.5" strokeLinejoin="round" strokeLinecap="round" />
      </svg>
    );
  }

  /* Full portfolio chart */
  function PortfolioChart({ width, height }) {
    const pts = `0,${height} ${width*0.05},${height*0.88} ${width*0.12},${height*0.82} ${width*0.2},${height*0.75} ${width*0.28},${height*0.7} ${width*0.35},${height*0.6} ${width*0.42},${height*0.55} ${width*0.5},${height*0.48} ${width*0.58},${height*0.4} ${width*0.65},${height*0.35} ${width*0.72},${height*0.28} ${width*0.8},${height*0.22} ${width*0.88},${height*0.16} ${width*0.94},${height*0.13} ${width},${height*0.08}`;
    return (
      <svg width={width} height={height} viewBox={`0 0 ${width} ${height}`} preserveAspectRatio="none">
        {/* X-axis labels */}
        {['Jan','Mar','May','Now'].map((l, i, arr) => (
          <text key={l} x={width * (i / (arr.length - 1))} y={height - 2} fontFamily={SANS} fontSize={10} fill={C.ink300} textAnchor={i === 0 ? 'start' : i === arr.length - 1 ? 'end' : 'middle'}>{l}</text>
        ))}
        <polyline points={pts} fill="none" stroke={C.aqua400} strokeWidth="1.75" strokeLinejoin="round" strokeLinecap="round" />
        {/* End dot */}
        <circle cx={width} cy={height * 0.08} r="3" fill={C.aqua400} />
      </svg>
    );
  }

  /* Holding row */
  function HoldingRow({ ticker, name, qty, value, pnl, pnlPct, positive = true, small = false }) {
    const pnlColor = positive ? C.aqua600 : C.red;
    const fs = small ? 13 : 14;
    return (
      <div style={{ display: 'flex', alignItems: 'center', gap: 12, padding: small ? '9px 0' : '11px 0', borderTop: `1px solid ${C.ink100}` }}>
        <div style={{ width: small ? 34 : 38, height: small ? 34 : 38, background: C.ink50, borderRadius: 4, display: 'flex', alignItems: 'center', justifyContent: 'center', fontFamily: SANS, fontWeight: 700, fontSize: 11, color: C.ink500, flexShrink: 0, letterSpacing: '0.01em' }}>{ticker}</div>
        <div style={{ flex: 1, minWidth: 0 }}>
          <div style={{ fontFamily: SANS, fontWeight: 600, fontSize: fs, color: C.ink800, letterSpacing: '-0.01em' }}>{name}</div>
          <div style={{ fontFamily: SANS, fontSize: 12, color: C.ink400, marginTop: 1 }}>{qty}</div>
        </div>
        <div style={{ textAlign: 'right', flexShrink: 0 }}>
          <div style={{ fontFamily: SANS, fontWeight: 600, fontSize: fs, color: C.ink900 }}>{value}</div>
          <div style={{ fontFamily: SANS, fontSize: 12, color: pnlColor }}>{pnl} ({pnlPct})</div>
        </div>
        <div style={{ width: 40, flexShrink: 0 }}>
          <Sparkline width={40} height={20} positive={positive} />
        </div>
      </div>
    );
  }

  /* Hero message — chat style, matching Variation A */
  function HeroMessage({ hero, text, time, isNew = false }) {
    return (
      <div style={{ display: 'flex', gap: 10, alignItems: 'flex-start' }}>
        <HeroAv init={hero.init} color={hero.color} size={30} />
        <div style={{ flex: 1 }}>
          <div style={{ display: 'flex', gap: 8, alignItems: 'baseline', marginBottom: 5 }}>
            <div style={{ fontFamily: SANS, fontWeight: 600, fontSize: 13, color: C.ink700 }}>{hero.name}</div>
            {time && <div style={{ fontFamily: SANS, fontSize: 11, color: C.ink300 }}>{time}</div>}
            {isNew && <div style={{ width: 5, height: 5, borderRadius: '50%', background: C.ame400, marginLeft: 2 }} />}
          </div>
          <div style={{ fontFamily: SANS, fontSize: 14, color: C.ink600, lineHeight: 1.55, textWrap: 'pretty' }}>{text}</div>
        </div>
      </div>
    );
  }

  /* User message bubble */
  function UserMessage({ text }) {
    return (
      <div style={{ display: 'flex', justifyContent: 'flex-end' }}>
        <div style={{ background: C.ame50, border: `1px solid ${C.ame100}`, borderRadius: '12px 2px 12px 12px', padding: '9px 14px', fontFamily: SANS, fontSize: 14, color: C.ame600, maxWidth: '75%', lineHeight: 1.5 }}>{text}</div>
      </div>
    );
  }

  /* Quick prompts */
  function QuickPrompts({ prompts }) {
    return (
      <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap' }}>
        {prompts.map(p => (
          <div key={p} style={{ border: `1px solid ${C.ink100}`, borderRadius: 999, padding: '5px 12px', fontFamily: SANS, fontSize: 12, color: C.ink500, background: C.white, cursor: 'default', whiteSpace: 'nowrap' }}>{p}</div>
        ))}
      </div>
    );
  }

  const WARREN = { init: 'WB', name: 'Warren', color: C.ame400 };
  const CATHIE  = { init: 'CW', name: 'Cathie',  color: C.aqua400 };

  const HOLDINGS = [
    { ticker: 'AAPL', name: 'Apple Inc.', qty: '31 sh', value: '$11,420', pnl: '+$5,420', pnlPct: '+90.3%', positive: true },
    { ticker: 'NVDA', name: 'Nvidia Corp.', qty: '8 sh', value: '$7,240', pnl: '+$3,040', pnlPct: '+72.4%', positive: true },
    { ticker: 'TSLA', name: 'Tesla', qty: '5 sh', value: '$3,015', pnl: '+$1,015', pnlPct: '+50.8%', positive: true },
    { ticker: 'VTI', name: 'Vanguard Total', qty: '10 sh', value: '$1,000', pnl: '+$0', pnlPct: '+0.0%', positive: true },
    { ticker: 'BTC', name: 'Bitcoin', qty: '0.08 BTC', value: '$2,253', pnl: '+$253', pnlPct: '+12.6%', positive: true },
  ];

  /* ══════════════════════════════════════════════════════════
     MOBILE
  ══════════════════════════════════════════════════════════ */
  function PortfolioMobile() {
    return (
      <div style={{ width: 390, height: 844, background: C.paper, display: 'flex', flexDirection: 'column', overflow: 'hidden' }}>
        {/* Status bar */}
        <div style={{ height: 52, display: 'flex', alignItems: 'flex-end', justifyContent: 'space-between', padding: '0 24px 10px', flexShrink: 0 }}>
          <div style={{ fontFamily: SANS, fontSize: 15, fontWeight: 600, color: C.ink900 }}>9:41</div>
          <div style={{ display: 'flex', gap: 5, alignItems: 'center' }}>
            <div style={{ width: 16, height: 10, border: `1.5px solid ${C.ink900}`, borderRadius: 2, position: 'relative' }}>
              <div style={{ position: 'absolute', left: 1, top: 1, bottom: 1, right: '30%', background: C.ink900, borderRadius: 1 }} />
            </div>
          </div>
        </div>

        {/* Scroll area */}
        <div style={{ flex: 1, overflow: 'hidden', display: 'flex', flexDirection: 'column' }}>
          {/* Portfolio header */}
          <div style={{ padding: '4px 24px 0', flexShrink: 0 }}>
            <Eyebrow color={C.ink400}>Portfolio</Eyebrow>
            <div style={{ display: 'flex', alignItems: 'baseline', gap: 12, marginTop: 6 }}>
              <div style={{ fontFamily: DISPLAY, fontWeight: 700, fontSize: 38, color: C.ink900, letterSpacing: '-0.02em', lineHeight: 1 }}>$28,340</div>
              <div style={{ fontFamily: SANS, fontSize: 14, color: C.aqua600, fontWeight: 500 }}>+$8,340 (+41.7%)</div>
            </div>
          </div>

          {/* Chart */}
          <div style={{ padding: '16px 24px 0', flexShrink: 0 }}>
            <PortfolioChart width={342} height={80} />
            <div style={{ display: 'flex', gap: 8, marginTop: 8 }}>
              {['1W','1M','3M','1Y','All'].map((l, i) => (
                <div key={l} style={{ height: 26, padding: '0 10px', borderRadius: 3, background: i === 4 ? C.ink900 : 'transparent', color: i === 4 ? C.white : C.ink400, fontFamily: SANS, fontSize: 12, fontWeight: i === 4 ? 600 : 400, display: 'flex', alignItems: 'center', cursor: 'default' }}>{l}</div>
              ))}
            </div>
          </div>

          {/* Stats row */}
          <div style={{ display: 'flex', padding: '16px 24px 0', gap: 0, flexShrink: 0 }}>
            {[['Cash','$3,412'],['Positions','5'],['Today','+$312']].map(([l, v], i, arr) => (
              <div key={l} style={{ flex: 1, borderRight: i < arr.length - 1 ? `1px solid ${C.ink100}` : 'none', paddingRight: i < arr.length - 1 ? 14 : 0, paddingLeft: i > 0 ? 14 : 0 }}>
                <Eyebrow color={C.ink400}>{l}</Eyebrow>
                <div style={{ fontFamily: SANS, fontWeight: 600, fontSize: 16, color: C.ink900, marginTop: 3 }}>{v}</div>
              </div>
            ))}
          </div>

          {/* Holdings */}
          <div style={{ flex: 1, padding: '20px 24px 0', overflow: 'hidden' }}>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 0 }}>
              <Eyebrow>Holdings</Eyebrow>
              <div style={{ fontFamily: SANS, fontSize: 12, color: C.ame400, cursor: 'default' }}>+ Add</div>
            </div>
            {HOLDINGS.slice(0, 4).map(h => (
              <HoldingRow key={h.ticker} {...h} small />
            ))}
          </div>
        </div>

        {/* Bottom nav */}
        <div style={{ height: 72, borderTop: `1px solid ${C.ink100}`, background: C.white, display: 'flex', alignItems: 'center', flexShrink: 0 }}>
          {[['Portfolio', true], ['Markets', false], ['Ask', false], ['Achievements', false]].map(([label, active]) => (
            <div key={label} style={{ flex: 1, display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 4 }}>
              <div style={{ width: 22, height: 22, borderRadius: label === 'Ask' ? '50%' : 4, background: active ? C.ink900 : label === 'Ask' ? C.ame400 : C.ink100, display: 'flex', alignItems: 'center', justifyContent: 'center', color: label === 'Ask' ? C.white : active ? C.white : C.ink400, fontSize: label === 'Ask' ? 12 : 10 }}>{label === 'Ask' ? '◇' : ''}</div>
              <div style={{ fontFamily: SANS, fontSize: 10, fontWeight: 500, color: active ? C.ink900 : label === 'Ask' ? C.ame400 : C.ink400 }}>{label}</div>
            </div>
          ))}
        </div>
      </div>
    );
  }

  /* ══════════════════════════════════════════════════════════
     DESKTOP — 02B Advisor's Room
  ══════════════════════════════════════════════════════════ */
  function PortfolioDesktop() {
    return (
      <div style={{ width: 1440, height: 900, background: C.paper, display: 'flex', flexDirection: 'column' }}>
        {/* Top nav */}
        <div style={{ height: 64, background: C.white, borderBottom: `1px solid ${C.ink100}`, display: 'flex', alignItems: 'center', padding: '0 40px', gap: 40, flexShrink: 0 }}>
          <Logo size={21} />
          <div style={{ flex: 1, display: 'flex', gap: 28 }}>
            {['Portfolio', 'Markets', 'Achievements'].map((item, i) => (
              <div key={item} style={{ fontFamily: SANS, fontSize: 15, fontWeight: i === 0 ? 600 : 400, color: i === 0 ? C.ink900 : C.ink400, borderBottom: i === 0 ? `2px solid ${C.ink900}` : 'none', paddingBottom: i === 0 ? 2 : 0, cursor: 'default' }}>{item}</div>
            ))}
          </div>
          <div style={{ display: 'flex', gap: 20, alignItems: 'center' }}>
            <div style={{ fontFamily: SANS, fontSize: 14, color: C.ink500 }}>Cash <span style={{ fontWeight: 600, color: C.ink900 }}>$3,412</span></div>
            <div style={{ width: 34, height: 34, borderRadius: '50%', background: C.ink900, display: 'flex', alignItems: 'center', justifyContent: 'center', fontFamily: SANS, fontWeight: 700, fontSize: 14, color: C.white }}>J</div>
          </div>
        </div>

        <div style={{ flex: 1, display: 'flex', minHeight: 0 }}>

          {/* Main portfolio area */}
          <div style={{ flex: 1, padding: '36px 40px', display: 'flex', flexDirection: 'column', gap: 24, overflow: 'hidden' }}>

            {/* Portfolio value */}
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-end' }}>
              <div>
                <Eyebrow color={C.ink400}>Portfolio value</Eyebrow>
                <div style={{ display: 'flex', alignItems: 'baseline', gap: 14, marginTop: 6 }}>
                  <div style={{ fontFamily: DISPLAY, fontWeight: 700, fontSize: 48, color: C.ink900, letterSpacing: '-0.025em', lineHeight: 1 }}>$28,340</div>
                  <div style={{ fontFamily: SANS, fontSize: 16, color: C.aqua600, fontWeight: 500 }}>+$8,340 · +41.7% all time</div>
                </div>
                <div style={{ fontFamily: SANS, fontSize: 14, color: C.ink400, marginTop: 4 }}>+$312 today (+1.1%)</div>
              </div>
              <div style={{ display: 'flex', gap: 8 }}>
                {['1W','1M','3M','1Y','All'].map((l, i) => (
                  <div key={l} style={{ height: 32, padding: '0 12px', borderRadius: 3, background: i === 4 ? C.ink900 : C.white, border: `1px solid ${i === 4 ? C.ink900 : C.ink100}`, color: i === 4 ? C.white : C.ink400, fontFamily: SANS, fontSize: 13, fontWeight: i === 4 ? 600 : 400, display: 'flex', alignItems: 'center', cursor: 'default' }}>{l}</div>
                ))}
              </div>
            </div>

            {/* Chart */}
            <div style={{ background: C.white, border: `1px solid ${C.ink100}`, borderRadius: 8, padding: '24px 24px 16px' }}>
              <PortfolioChart width={760} height={140} />
            </div>

            {/* Holdings */}
            <div style={{ flex: 1, minHeight: 0 }}>
              <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 4 }}>
                <Eyebrow>Holdings · 5 positions</Eyebrow>
                <div style={{ height: 32, padding: '0 14px', borderRadius: 3, border: `1px solid ${C.ink100}`, background: C.white, fontFamily: SANS, fontSize: 13, color: C.ink600, display: 'flex', alignItems: 'center', cursor: 'default', gap: 6 }}>+ Add position</div>
              </div>
              {HOLDINGS.map(h => <HoldingRow key={h.ticker} {...h} />)}
            </div>
          </div>

          {/* Hero sidebar */}
          <div style={{ width: 380, borderLeft: `1px solid ${C.ink100}`, background: C.white, display: 'flex', flexDirection: 'column' }}>

            {/* Sidebar header — subtle tabs */}
            <div style={{ height: 52, display: 'flex', borderBottom: `1px solid ${C.ink100}`, flexShrink: 0 }}>
              {[['Council', true], ['Warren', false], ['Cathie', false]].map(([label, active]) => (
                <div key={label} style={{ flex: 1, display: 'flex', alignItems: 'center', justifyContent: 'center', fontFamily: SANS, fontSize: 13, fontWeight: active ? 600 : 400, color: active ? C.ink900 : C.ink400, borderBottom: active ? `2px solid ${C.ink900}` : 'none', cursor: 'default' }}>{label}</div>
              ))}
            </div>

            {/* Hero avatars */}
            <div style={{ padding: '18px 24px 14px', display: 'flex', gap: 10, alignItems: 'center', borderBottom: `1px solid ${C.ink100}`, flexShrink: 0 }}>
              <div style={{ display: 'flex' }}>
                <HeroAv init="WB" color={C.ame400} size={32} style={{ border: `2px solid ${C.white}` }} />
                <HeroAv init="CW" color={C.aqua400} size={32} style={{ marginLeft: -10, border: `2px solid ${C.white}` }} />
              </div>
              <div style={{ flex: 1 }}>
                <div style={{ fontFamily: SANS, fontWeight: 600, fontSize: 14, color: C.ink800 }}>Warren + Cathie</div>
                <div style={{ fontFamily: SANS, fontSize: 12, color: C.ink400, marginTop: 1 }}>2 of 3 council slots · watching your portfolio</div>
              </div>
              <div style={{ width: 7, height: 7, borderRadius: '50%', background: C.aqua400, flexShrink: 0 }} />
            </div>

            {/* Quick prompts */}
            <div style={{ padding: '14px 24px', borderBottom: `1px solid ${C.ink100}`, flexShrink: 0 }}>
              <QuickPrompts prompts={['Review my picks', 'Too concentrated?', 'Should I sell TSLA?']} />
            </div>

            {/* Chat area */}
            <div style={{ flex: 1, padding: '20px 24px', display: 'flex', flexDirection: 'column', gap: 18, overflow: 'hidden' }}>
              <HeroMessage hero={WARREN} text="Your Apple position is carrying this portfolio — in a good way. 90% return on a business with this moat is exactly what patience looks like." time="2h ago" />
              <UserMessage text="Should I sell some AAPL and diversify?" />
              <HeroMessage hero={WARREN} text="Only if you've found something you understand better. Diversification into things you don't understand isn't protection — it's a different kind of risk." time="2h ago" />
              <HeroMessage hero={CATHIE} text="I'd keep AAPL. But your Bitcoin position is small — if you believe in the thesis, it might be worth adding. Warren won't agree with me on that." time="1h ago" isNew />
            </div>

            {/* Input */}
            <div style={{ padding: '14px 24px 20px', borderTop: `1px solid ${C.ink100}`, flexShrink: 0 }}>
              <div style={{ display: 'flex', gap: 8, alignItems: 'center', border: `1px solid ${C.ink100}`, borderRadius: 4, padding: '0 4px 0 14px', height: 44, background: C.paper }}>
                <div style={{ flex: 1, fontFamily: SANS, fontSize: 14, color: C.ink300 }}>Ask your council…</div>
                <div style={{ width: 34, height: 34, borderRadius: 3, background: C.ink900, display: 'flex', alignItems: 'center', justifyContent: 'center', color: C.white, fontSize: 16, cursor: 'default' }}>→</div>
              </div>
            </div>
          </div>
        </div>
      </div>
    );
  }

  /* ══════════════════════════════════════════════════════════
     MOBILE — Ask tab (hero chat full screen)
  ══════════════════════════════════════════════════════════ */
  function AskTabMobile() {
    return (
      <div style={{ width: 390, height: 844, background: C.white, display: 'flex', flexDirection: 'column', overflow: 'hidden' }}>
        {/* Status bar */}
        <div style={{ height: 52, display: 'flex', alignItems: 'flex-end', justifyContent: 'space-between', padding: '0 24px 10px', flexShrink: 0 }}>
          <div style={{ fontFamily: SANS, fontSize: 15, fontWeight: 600, color: C.ink900 }}>9:41</div>
        </div>

        {/* Header */}
        <div style={{ padding: '0 24px 14px', borderBottom: `1px solid ${C.ink100}`, flexShrink: 0 }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
            <div style={{ display: 'flex' }}>
              <HeroAv init="WB" color={C.ame400} size={34} style={{ border: `2px solid ${C.white}` }} />
              <HeroAv init="CW" color={C.aqua400} size={34} style={{ marginLeft: -10, border: `2px solid ${C.white}` }} />
            </div>
            <div>
              <div style={{ fontFamily: SANS, fontWeight: 600, fontSize: 16, color: C.ink900 }}>Your Council</div>
              <div style={{ fontFamily: SANS, fontSize: 12, color: C.ink400 }}>Warren · Cathie</div>
            </div>
            <div style={{ marginLeft: 'auto', width: 7, height: 7, borderRadius: '50%', background: C.aqua400 }} />
          </div>
        </div>

        {/* Quick prompts */}
        <div style={{ padding: '12px 24px', borderBottom: `1px solid ${C.ink100}`, flexShrink: 0 }}>
          <QuickPrompts prompts={['Review my picks', 'Too concentrated?', 'Should I sell TSLA?']} />
        </div>

        {/* Messages */}
        <div style={{ flex: 1, padding: '16px 24px', display: 'flex', flexDirection: 'column', gap: 16, overflow: 'hidden' }}>
          <HeroMessage hero={WARREN} text="Your Apple position is carrying this portfolio — in a good way. Patience on a business with this moat is exactly right." time="2h ago" />
          <UserMessage text="Should I sell some AAPL and diversify?" />
          <HeroMessage hero={WARREN} text="Only if you've found something you understand better. Diversification into things you don't understand isn't protection." time="2h ago" />
          <HeroMessage hero={CATHIE} text="I'd keep AAPL. Bitcoin is worth adding to — if you believe the thesis. Warren won't agree." time="1h ago" isNew />
        </div>

        {/* Input */}
        <div style={{ padding: '12px 24px 20px', borderTop: `1px solid ${C.ink100}`, flexShrink: 0 }}>
          <div style={{ display: 'flex', gap: 8, alignItems: 'center', border: `1px solid ${C.ink100}`, borderRadius: 4, padding: '0 4px 0 14px', height: 44, background: C.paper }}>
            <div style={{ flex: 1, fontFamily: SANS, fontSize: 14, color: C.ink300 }}>Ask your council…</div>
            <div style={{ width: 34, height: 34, borderRadius: 3, background: C.ink900, display: 'flex', alignItems: 'center', justifyContent: 'center', color: C.white, fontSize: 16 }}>→</div>
          </div>
        </div>

        {/* Bottom nav */}
        <div style={{ height: 72, borderTop: `1px solid ${C.ink100}`, background: C.white, display: 'flex', alignItems: 'center', flexShrink: 0 }}>
          {[['Portfolio', false], ['Markets', false], ['Ask', true], ['Achievements', false]].map(([label, active]) => (
            <div key={label} style={{ flex: 1, display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 4 }}>
              <div style={{ width: 22, height: 22, borderRadius: label === 'Ask' ? '50%' : 4, background: label === 'Ask' ? C.ame400 : active ? C.ink900 : C.ink100, display: 'flex', alignItems: 'center', justifyContent: 'center', color: label === 'Ask' ? C.white : active ? C.white : C.ink400, fontSize: label === 'Ask' ? 12 : 10 }}>{label === 'Ask' ? '◇' : ''}</div>
              <div style={{ fontFamily: SANS, fontSize: 10, fontWeight: 500, color: label === 'Ask' ? C.ame400 : active ? C.ink900 : C.ink400 }}>{label}</div>
            </div>
          ))}
        </div>
      </div>
    );
  }

  function App() {
    return (
      <DesignCanvas title="simFolio Hi-fi v1 — Portfolio · Variation A (Chat-first)">

        <DCSection id="portfolio-desk" title="Portfolio home — Desktop" subtitle="02B Advisor's Room. Hero sidebar tabs: Council (all heroes), Warren, Cathie. Chat-style messages, no static commentary boxes. Quick prompts reduce typing friction. Holdings row includes a 40px sparkline — minimal line, no fill.">
          <DCArtboard id="pd" label="Desktop · 1440px" width={1440} height={900}>
            <PortfolioDesktop />
          </DCArtboard>
        </DCSection>

        <DCSection id="portfolio-mob" title="Portfolio home — Mobile" subtitle="Main tab: portfolio value (MOMCAKE display), chart, range selector, stats row, holdings. Ask tab: full-screen hero council chat — identical to sidebar experience on desktop.">
          <DCArtboard id="pm" label="Mobile · Portfolio tab" width={390} height={844}>
            <PortfolioMobile />
          </DCArtboard>
          <DCArtboard id="pm-ask" label="Mobile · Ask tab (hero chat)" width={390} height={844}>
            <AskTabMobile />
          </DCArtboard>
        </DCSection>

      </DesignCanvas>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
