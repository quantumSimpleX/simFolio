<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>simFolio — Hi-fi Auth & Welcome</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script type="text/babel" src="design-canvas.jsx"></script>
  <style>
    @font-face { font-family:'MOMCAKE'; src:url('fonts/MOMCAKE-Bold.otf') format('opentype'); font-weight:700; font-display:swap; }
    *,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
  </style>
</head>
<body><div id="root"></div>
<script type="text/babel">
  const { DesignCanvas, DCSection, DCArtboard } = window;

  const C = {
    paper:'#FAFAF7', white:'#FFFFFF',
    ink900:'#0A0E14', ink700:'#242B35', ink600:'#3A434F',
    ink500:'#5A6573', ink400:'#7E8794', ink300:'#A6ADB7',
    ink200:'#CDD2D9', ink100:'#E6E9ED', ink50:'#F4F5F7',
    ame400:'#8A60EB', ame600:'#582EB3', ame200:'#C5B0F8', ame100:'#E2D8FC', ame50:'#F2EEFE',
    aqua400:'#1FC3A4', aqua600:'#008771', aqua50:'#E6FBF7',
  };
  const SANS    = "'Barlow Condensed','Helvetica Neue',system-ui,sans-serif";
  const DISPLAY = "'MOMCAKE','Helvetica Neue',system-ui,sans-serif";

  /* ── primitives ── */
  function StatusBar() {
    return <div style={{height:52,display:'flex',alignItems:'flex-end',justifyContent:'space-between',padding:'0 24px 10px',flexShrink:0}}><div style={{fontFamily:SANS,fontSize:15,fontWeight:600,color:C.ink900}}>9:41</div><div style={{width:16,height:10,border:`1.5px solid ${C.ink900}`,borderRadius:2,position:'relative'}}><div style={{position:'absolute',left:1,top:1,bottom:1,right:'30%',background:C.ink900,borderRadius:1}}/></div></div>;
  }

  function Mark({ size=40 }) {
    return (
      <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:8}}>
        <div style={{width:size,height:size,borderRadius:Math.round(size*0.2),background:`${C.ame400}10`,border:`2px solid ${C.ame400}30`,display:'flex',alignItems:'center',justifyContent:'center',color:C.ame400,fontSize:Math.round(size*0.55)}}>◇</div>
        <div style={{fontFamily:DISPLAY,fontWeight:700,fontSize:Math.round(size*0.65),color:C.ink900,letterSpacing:'-0.025em'}}>simFolio</div>
      </div>
    );
  }

  function SimPill() {
    return (
      <div style={{display:'inline-flex',alignItems:'center',gap:6,background:C.ame50,border:`1px solid ${C.ame100}`,borderRadius:999,padding:'4px 12px',fontFamily:SANS,fontSize:12,color:C.ame600,fontWeight:500}}>
        <div style={{width:5,height:5,borderRadius:'50%',background:C.ame400}}/>
        Simulated only — no real money
      </div>
    );
  }

  function CTA({ label, full=false, ghost=false, style={} }) {
    return (
      <div style={{height:48,background:ghost?'transparent':C.ink900,color:ghost?C.ink700:C.white,border:ghost?`1px solid ${C.ink200}`:'none',borderRadius:4,display:'flex',alignItems:'center',justifyContent:'center',fontFamily:SANS,fontSize:15,fontWeight:600,letterSpacing:'0.01em',cursor:'default',width:full?'100%':undefined,...style}}>{label}</div>
    );
  }

  function Field({ label, placeholder, filled=false, error=false }) {
    return (
      <div style={{display:'flex',flexDirection:'column',gap:6}}>
        <div style={{fontFamily:SANS,fontSize:13,fontWeight:600,color:error?C.red:C.ink600,letterSpacing:'0.04em'}}>{label}</div>
        <div style={{height:48,border:`1.5px solid ${error?'#D43A2F':filled?C.ink700:C.ink200}`,borderRadius:4,padding:'0 14px',display:'flex',alignItems:'center',background:C.white,fontFamily:SANS,fontSize:15,color:filled?C.ink900:C.ink300}}>
          {placeholder}
        </div>
        {error && <div style={{fontFamily:SANS,fontSize:12,color:'#D43A2F'}}>Please enter a valid email address</div>}
      </div>
    );
  }

  function SocialBtn({ provider }) {
    return (
      <div style={{height:48,border:`1px solid ${C.ink200}`,borderRadius:4,display:'flex',alignItems:'center',gap:12,padding:'0 18px',background:C.white,cursor:'default',flex:1}}>
        <div style={{width:18,height:18,borderRadius:'50%',background:C.ink100,flexShrink:0}}/>
        <div style={{fontFamily:SANS,fontSize:14,fontWeight:500,color:C.ink700}}>Continue with {provider}</div>
      </div>
    );
  }

  function Divider({ label='or with email' }) {
    return (
      <div style={{display:'flex',alignItems:'center',gap:12}}>
        <div style={{flex:1,height:1,background:C.ink100}}/>
        <div style={{fontFamily:SANS,fontSize:12,color:C.ink400}}>{label}</div>
        <div style={{flex:1,height:1,background:C.ink100}}/>
      </div>
    );
  }

  function LangToggle() {
    return (
      <div style={{display:'inline-flex',border:`1px solid ${C.ink100}`,borderRadius:4,overflow:'hidden'}}>
        {['EN','繁中'].map((l,i)=>(
          <div key={l} style={{padding:'5px 14px',fontFamily:SANS,fontSize:13,fontWeight:i===0?600:400,background:i===0?C.ink900:'transparent',color:i===0?C.white:C.ink400,cursor:'default'}}>{l}</div>
        ))}
      </div>
    );
  }

  /* ════════════════════════════════════════
     01 — WELCOME
  ════════════════════════════════════════ */

  function WelcomeMobile() {
    return (
      <div style={{width:390,height:844,background:C.paper,display:'flex',flexDirection:'column',overflow:'hidden'}}>
        <StatusBar/>
        <div style={{flex:1,display:'flex',flexDirection:'column',padding:'16px 32px',gap:0}}>
          {/* Brand mark */}
          <div style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:24}}>
            <Mark size={48}/>
            <div style={{textAlign:'center',maxWidth:280}}>
              <div style={{fontFamily:SANS,fontSize:18,fontWeight:400,color:C.ink600,lineHeight:1.6,textWrap:'pretty'}}>
                Learn investing by doing it.<br/>With legendary investors as your guides.
              </div>
            </div>
            <SimPill/>
            {/* Hero tease — 3 small avatars */}
            <div style={{display:'flex',gap:0}}>
              {[['WB',C.ame400],['CW',C.aqua400],['RD','#B5860A']].map(([init,color],i)=>(
                <div key={init} style={{width:44,height:44,borderRadius:'50%',background:`${color}10`,border:`2px solid ${C.white}`,marginLeft:i>0?-10:0,display:'flex',alignItems:'center',justifyContent:'center',fontFamily:SANS,fontWeight:700,fontSize:13,color,zIndex:3-i}}>
                  {i<2?init:'?'}
                </div>
              ))}
              <div style={{width:44,height:44,borderRadius:'50%',background:C.ink50,border:`2px solid ${C.white}`,marginLeft:-10,display:'flex',alignItems:'center',justifyContent:'center',fontFamily:SANS,fontSize:11,color:C.ink400,zIndex:0}}>+7</div>
            </div>
            <div style={{fontFamily:SANS,fontSize:13,color:C.ink400}}>10 legendary investors in the library</div>
          </div>
          {/* CTAs */}
          <div style={{display:'flex',flexDirection:'column',gap:10,paddingBottom:8}}>
            <CTA label="Get started  →" full/>
            <CTA label="Sign in" full ghost/>
            <div style={{display:'flex',gap:8}}>
              <SocialBtn provider="Google"/>
              <SocialBtn provider="Apple"/>
            </div>
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',paddingTop:4}}>
              <div style={{fontFamily:SANS,fontSize:12,color:C.ink400}}>Tooltip language:</div>
              <LangToggle/>
            </div>
          </div>
        </div>
      </div>
    );
  }

  function WelcomeDesktop() {
    return (
      <div style={{width:1440,height:900,background:C.paper,display:'flex'}}>
        {/* Left — brand panel */}
        <div style={{width:580,background:C.ink900,display:'flex',flexDirection:'column',padding:'64px 72px',gap:0}}>
          {/* Logo */}
          <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:'auto'}}>
            <div style={{width:32,height:32,borderRadius:6,background:`${C.ame400}20`,border:`1.5px solid ${C.ame400}50`,display:'flex',alignItems:'center',justifyContent:'center',color:C.ame400,fontSize:18}}>◇</div>
            <div style={{fontFamily:DISPLAY,fontWeight:700,fontSize:24,color:C.white,letterSpacing:'-0.02em'}}>simFolio</div>
          </div>
          {/* Headline */}
          <div style={{marginTop:'auto',marginBottom:40}}>
            <div style={{fontFamily:DISPLAY,fontWeight:700,fontSize:52,color:C.white,letterSpacing:'-0.025em',lineHeight:1.0,marginBottom:20}}>
              Learn investing<br/>by doing it.
            </div>
            <div style={{fontFamily:SANS,fontSize:18,color:C.ink400,lineHeight:1.6,maxWidth:380}}>
              Simulated trades, real market data, and legendary investors guiding every decision.
            </div>
          </div>
          {/* Hero cards */}
          <div style={{display:'flex',flexDirection:'column',gap:12}}>
            {[
              {init:'WB',name:'Warren Buffett',style:'Value investing',color:C.ame400,quote:'Buy wonderful companies at fair prices.'},
              {init:'CW',name:'Cathie Wood',style:'Disruptive innovation',color:C.aqua400,quote:'Invest in the future, not the past.'},
            ].map(h=>(
              <div key={h.init} style={{display:'flex',gap:14,alignItems:'center',padding:'14px 18px',background:'rgba(255,255,255,0.04)',border:'1px solid rgba(255,255,255,0.08)',borderRadius:8}}>
                <div style={{width:40,height:40,borderRadius:'50%',background:`${h.color}18`,border:`1.5px solid ${h.color}40`,display:'flex',alignItems:'center',justifyContent:'center',fontFamily:SANS,fontWeight:700,fontSize:13,color:h.color,flexShrink:0}}>{h.init}</div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontFamily:SANS,fontWeight:600,fontSize:15,color:C.white}}>{h.name}</div>
                  <div style={{fontFamily:SANS,fontSize:13,color:h.color}}>{h.style}</div>
                </div>
                <div style={{fontFamily:SANS,fontSize:12,color:'rgba(255,255,255,0.3)',fontStyle:'italic',maxWidth:160,textAlign:'right',lineHeight:1.4}}>"{h.quote}"</div>
              </div>
            ))}
            <div style={{fontFamily:SANS,fontSize:13,color:'rgba(255,255,255,0.25)',textAlign:'center',marginTop:4}}>+ 8 more in the library — revealed after onboarding</div>
          </div>
          {/* Bottom */}
          <div style={{marginTop:32}}>
            <SimPill/>
          </div>
        </div>
        {/* Right — sign up form */}
        <div style={{flex:1,display:'flex',alignItems:'center',justifyContent:'center',padding:'64px 72px'}}>
          <div style={{width:'100%',maxWidth:420,display:'flex',flexDirection:'column',gap:20}}>
            <div>
              <div style={{fontFamily:SANS,fontWeight:700,fontSize:28,color:C.ink900,letterSpacing:'-0.01em',marginBottom:6}}>Create your account</div>
              <div style={{fontFamily:SANS,fontSize:15,color:C.ink500}}>Start investing in minutes. No real money involved.</div>
            </div>
            <div style={{display:'flex',gap:10}}>
              <SocialBtn provider="Google"/>
              <SocialBtn provider="Apple"/>
            </div>
            <Divider/>
            <Field label="First name" placeholder="Jamie" filled/>
            <Field label="Email" placeholder="jamie@example.com" filled/>
            <Field label="Password" placeholder="••••••••••" filled/>
            {/* Language */}
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'10px 16px',background:C.ink50,border:`1px solid ${C.ink100}`,borderRadius:4}}>
              <div style={{fontFamily:SANS,fontSize:13,color:C.ink600}}>Tooltip language</div>
              <LangToggle/>
            </div>
            <CTA label="Create account  →" full/>
            <div style={{fontFamily:SANS,fontSize:12,color:C.ink400,textAlign:'center',lineHeight:1.6}}>By signing up you agree to our Terms of Service.<br/>simFolio uses simulated money only — no real transactions occur.</div>
            <div style={{textAlign:'center',fontFamily:SANS,fontSize:14,color:C.ink500}}>Already have an account? <span style={{color:C.ame400,cursor:'default',fontWeight:600}}>Sign in</span></div>
          </div>
        </div>
      </div>
    );
  }

  /* ════════════════════════════════════════
     02 — SIGN UP (mobile)
  ════════════════════════════════════════ */

  function SignUpMobile() {
    return (
      <div style={{width:390,height:844,background:C.paper,display:'flex',flexDirection:'column',overflow:'hidden'}}>
        <StatusBar/>
        <div style={{padding:'0 24px 14px',display:'flex',alignItems:'center',borderBottom:`1px solid ${C.ink100}`,flexShrink:0}}>
          <div style={{fontFamily:SANS,fontSize:14,color:C.ame400,cursor:'default'}}>← Back</div>
          <div style={{flex:1,textAlign:'center',fontFamily:SANS,fontWeight:700,fontSize:17,color:C.ink900}}>Create account</div>
          <div style={{width:40}}/>
        </div>
        <div style={{flex:1,padding:'24px 24px',display:'flex',flexDirection:'column',gap:14,overflow:'hidden'}}>
          {/* Social */}
          <div style={{display:'flex',flexDirection:'column',gap:10}}>
            <SocialBtn provider="Google"/>
            <SocialBtn provider="Apple"/>
          </div>
          <Divider/>
          <Field label="First name" placeholder="Jamie" filled/>
          <Field label="Email" placeholder="jamie@example.com" filled/>
          <Field label="Password" placeholder="••••••••••" filled/>
          <div style={{padding:'10px 14px',background:C.ink50,border:`1px solid ${C.ink100}`,borderRadius:4,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <div style={{fontFamily:SANS,fontSize:13,color:C.ink600}}>Tooltip language</div>
            <LangToggle/>
          </div>
          <CTA label="Create account  →" full/>
          <div style={{fontFamily:SANS,fontSize:11,color:C.ink400,textAlign:'center',lineHeight:1.6}}>By signing up you agree to our Terms. simFolio uses simulated money only.</div>
          <div style={{textAlign:'center',fontFamily:SANS,fontSize:14,color:C.ink500}}>Have an account? <span style={{color:C.ame400,cursor:'default',fontWeight:600}}>Sign in</span></div>
        </div>
      </div>
    );
  }

  /* ════════════════════════════════════════
     03 — SIGN IN (mobile)
  ════════════════════════════════════════ */

  function SignInMobile() {
    return (
      <div style={{width:390,height:720,background:C.paper,display:'flex',flexDirection:'column',overflow:'hidden'}}>
        <StatusBar/>
        <div style={{padding:'0 24px 14px',display:'flex',alignItems:'center',borderBottom:`1px solid ${C.ink100}`,flexShrink:0}}>
          <div style={{fontFamily:SANS,fontSize:14,color:C.ame400,cursor:'default'}}>← Back</div>
          <div style={{flex:1,textAlign:'center',fontFamily:SANS,fontWeight:700,fontSize:17,color:C.ink900}}>Sign in</div>
          <div style={{width:40}}/>
        </div>
        <div style={{flex:1,padding:'28px 24px',display:'flex',flexDirection:'column',gap:16}}>
          <div style={{display:'flex',flexDirection:'column',gap:10}}>
            <SocialBtn provider="Google"/>
            <SocialBtn provider="Apple"/>
          </div>
          <Divider/>
          <Field label="Email" placeholder="jamie@example.com" filled/>
          <div>
            <Field label="Password" placeholder="••••••••••" filled/>
            <div style={{display:'flex',justifyContent:'flex-end',marginTop:6}}>
              <div style={{fontFamily:SANS,fontSize:13,color:C.ame400,cursor:'default'}}>Forgot password?</div>
            </div>
          </div>
          <CTA label="Sign in  →" full style={{marginTop:4}}/>
          <div style={{textAlign:'center',fontFamily:SANS,fontSize:14,color:C.ink500,marginTop:4}}>New here? <span style={{color:C.ame400,cursor:'default',fontWeight:600}}>Create an account</span></div>
        </div>
      </div>
    );
  }

  /* ════════════════════════════════════════
     04 — RETURNING USER
  ════════════════════════════════════════ */

  function ReturningUser() {
    return (
      <div style={{width:390,height:680,background:C.paper,display:'flex',flexDirection:'column',overflow:'hidden'}}>
        <StatusBar/>
        <div style={{flex:1,padding:'28px 28px',display:'flex',flexDirection:'column',gap:24}}>
          <div style={{display:'flex',flexDirection:'column',gap:8}}>
            <div style={{fontFamily:DISPLAY,fontWeight:700,fontSize:30,color:C.ink900,letterSpacing:'-0.02em'}}>Welcome back, Jamie.</div>
            <div style={{fontFamily:SANS,fontSize:16,color:C.ink500,lineHeight:1.5}}>Your portfolio is up <span style={{color:C.aqua600,fontWeight:600}}>+$1,120</span> since your last visit.</div>
          </div>
          {/* Quick stats */}
          <div style={{background:C.white,border:`1px solid ${C.ink100}`,borderRadius:8,padding:'0 20px'}}>
            {[['Portfolio value','$28,340'],['Pending orders','2'],['Last visited','3 days ago']].map(([l,v],i,arr)=>(
              <div key={l} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'11px 0',borderBottom:i<arr.length-1?`1px solid ${C.ink100}`:'none'}}>
                <div style={{fontFamily:SANS,fontSize:14,color:C.ink500}}>{l}</div>
                <div style={{fontFamily:SANS,fontSize:14,fontWeight:700,color:C.ink900}}>{v}</div>
              </div>
            ))}
          </div>
          {/* Warren note */}
          <div style={{display:'flex',gap:10,padding:'12px 16px',background:C.ame50,border:`1px solid ${C.ame100}`,borderRadius:8}}>
            <div style={{width:30,height:30,borderRadius:'50%',background:`${C.ame400}12`,border:`1.5px solid ${C.ame400}35`,display:'flex',alignItems:'center',justifyContent:'center',fontFamily:SANS,fontWeight:700,fontSize:10,color:C.ame400,flexShrink:0}}>WB</div>
            <div style={{fontFamily:SANS,fontSize:13,color:C.ink600,lineHeight:1.5,fontStyle:'italic'}}>"Markets were choppy while you were away. Nothing to panic about — your Apple position is fine."</div>
          </div>
          {/* Auth */}
          <div style={{display:'flex',flexDirection:'column',gap:10}}>
            <div style={{height:48,border:`1px solid ${C.ink200}`,borderRadius:4,display:'flex',alignItems:'center',gap:12,padding:'0 18px',background:C.white,cursor:'default'}}>
              <div style={{width:20,height:20,background:C.ink100,borderRadius:4,flexShrink:0}}/>
              <div style={{fontFamily:SANS,fontSize:14,fontWeight:500,color:C.ink700}}>Sign in with Face ID</div>
            </div>
            <CTA label="Go to my portfolio  →" full/>
            <div style={{textAlign:'center',fontFamily:SANS,fontSize:13,color:C.ink400,cursor:'default'}}>Not Jamie? Sign out</div>
          </div>
        </div>
      </div>
    );
  }

  /* ════════════════════════════════════════
     APP
  ════════════════════════════════════════ */
  function App() {
    return (
      <DesignCanvas title="simFolio Hi-fi — Auth & Welcome">
        <DCSection id="welcome" title="01 — Welcome / landing" subtitle="Mobile: brand mark, tagline, hero avatar tease (stacked avatars, +7 indicator), simulation promise, CTAs + social auth + language toggle. Desktop: split — ink-900 brand panel left, sign-up form right.">
          <DCArtboard id="w-mob" label="Welcome — mobile" width={390} height={844}><WelcomeMobile/></DCArtboard>
          <DCArtboard id="w-desk" label="Welcome — desktop (with sign-up form)" width={1440} height={900}><WelcomeDesktop/></DCArtboard>
        </DCSection>
        <DCSection id="signup" title="02 — Sign up (mobile)" subtitle="Social first, email second. Language preference captured at sign-up — not buried in settings later. Clean field states: resting (ink-200 border), filled (ink-700), error (red + message).">
          <DCArtboard id="su" label="Sign up — mobile" width={390} height={844}><SignUpMobile/></DCArtboard>
          <DCArtboard id="si" label="Sign in — mobile" width={390} height={720}><SignInMobile/></DCArtboard>
        </DCSection>
        <DCSection id="return" title="03 — Returning user" subtitle="App recognises the user. Portfolio delta surfaced immediately. Warren's voice appears without the user asking — a small ambient signal that the hero is alive. Face ID for zero-friction re-entry.">
          <DCArtboard id="ru" label="Returning user — quick resume" width={390} height={680}><ReturningUser/></DCArtboard>
        </DCSection>
      </DesignCanvas>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
